<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>관리자 페이지 - 학업정서(EQ)</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: var(--c-bg);
        padding: 40px 20px;
      }
      .admin-container {
        max-width: 1100px;
        margin: 0 auto;
        background: var(--c-surface);
        border-radius: var(--r-xl);
        padding: 30px;
        box-shadow: var(--shadow);
      }
      h1 {
        font-family: var(--font-serif);
        color: var(--c-primary);
        margin-bottom: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }
      th,
      td {
        padding: 12px 15px;
        border-bottom: 1px solid var(--c-border);
        font-size: 0.9rem;
      }
      th {
        font-weight: 700;
        color: var(--c-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.8rem;
      }
      tr:hover td {
        background: var(--c-selected);
      }
      .btn-view {
        display: inline-block;
        padding: 6px 12px;
        background: var(--c-primary);
        color: #fff;
        text-decoration: none;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .btn-view:hover {
        background: var(--c-accent);
      }
      .status-badge {
        display: inline-block;
        padding: 3px 8px;
        border-radius: 100px;
        font-size: 0.7rem;
        font-weight: 700;
      }
      .status-badge.has-report {
        background: #dcfce7;
        color: #166534;
      }
      .status-badge.no-report {
        background: #fee2e2;
        color: #991b1b;
      }

      .btn-generate {
        display: inline-block;
        padding: 6px 14px;
        background: linear-gradient(135deg, #6366f1, #4f5fcf);
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      .btn-generate:hover:not(:disabled) {
        opacity: 0.85;
        transform: translateY(-1px);
      }
      .btn-generate:disabled {
        opacity: 0.45;
        cursor: default;
        transform: none;
      }
      .btn-generate.done {
        background: #d1fae5;
        color: #065f46;
      }

      /* Login Overlay Styles */
      #login-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #0d1b2a;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .auth-box {
        background: #fdfaf6;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        border: 1px solid rgba(200, 169, 110, 0.3);
      }
      .auth-box h2 {
        font-size: 20px;
        color: #0d1b2a;
        margin-bottom: 24px;
        font-weight: 700;
      }
      .auth-box input {
        width: 100%;
        padding: 12px 16px;
        font-size: 15px;
        border: 1px solid rgba(13, 27, 42, 0.1);
        border-radius: 6px;
        background: #fff;
        margin-bottom: 16px;
        text-align: center;
      }
      .auth-box input:focus {
        outline: none;
        border-color: #c8a96e;
      }
      .auth-box button {
        width: 100%;
        padding: 14px;
        font-size: 15px;
        font-weight: 700;
        background: #0d1b2a;
        color: #fdfaf6;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .auth-box button:hover {
        background: #c8a96e;
        color: #0d1b2a;
      }
    </style>
    <script>
      window.APP_CONFIG = {
        apiBase: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
          ? 'http://127.0.0.1:8790'
          : 'https://studymental.kimsoosuk1.workers.dev',
      };
    </script>
  </head>
  <body>
    <!-- 인증 화면 -->
    <div id="login-overlay">
      <div class="auth-box">
        <h2>관리자 인증</h2>
        <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')login()">
        <button onclick="login()">로그인</button>
      </div>
    </div>

    <div class="admin-container">
      <h1>진단 결과 관리</h1>
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>학년</th>
            <th>성별</th>
            <th>종합 지수</th>
            <th>AI 레포트</th>
            <th>응답일시</th>
            <th>결과 보기</th>
            <th>레포트 생성</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="result-list">
          <tr>
            <td colspan="8">로딩 중...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <script type="module" src="js/admin.js"></script>
  </body>
</html>
